name: Build and Deploy

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]
    types: [ closed ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run generate

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: .output/public

  deploy:
    name: Deploy to dija.com.br (WordPress Theme Folder)
    needs: build
    # Executa apenas se houver um push na 'master' (incluindo merges) OU disparo manual
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy to dija.com.br
        run: |
          # Definimos a base para evitar erros de barra dupla //
          # Se o secret for 'public_html/' ele vira 'public_html'
          BASE_PATH=$(echo "${{ secrets.HOSTINGER_REMOTE_PATH }}" | sed 's/\/$//')
          
          echo "🚀 Iniciando deploy em: $BASE_PATH"

          # 1. Upload para a RAIZ (SSG e SEO)
          rsync -avzc --exclude='wp-admin/' --exclude='wp-content/' --exclude='wp-includes/' --exclude='wp-*.php' --exclude='index.php' --exclude='functions.php' --exclude='style.css' --exclude='.htaccess' --exclude='_nuxt/' \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_SERVER_IP }}:$BASE_PATH/

          # 2. Upload para o TEMA (Ponte WordPress e Assets)
          # Aqui usamos o caminho exato sem risco de //
          rsync -avzc \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_SERVER_IP }}:$BASE_PATH/wp-content/themes/dija-theme/
