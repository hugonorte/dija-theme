name: Build and Deploy

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]
    types: [ closed ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run generate

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: .output/public

  deploy:
    name: Deploy to dija.com.br (WordPress Theme Folder)
    needs: build
    # Executa apenas se houver um push na 'master' (incluindo merges) OU disparo manual
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy to dija.com.br
        # O HOSTINGER_REMOTE_PATH deve ser a raiz: public_html/
        run: |
          # 1. Enviar arquivos estáticos para a raiz (excluindo WordPress e a pasta _nuxt)
          rsync -avz --exclude='wp-admin/' --exclude='wp-content/' --exclude='wp-includes/' --exclude='wp-*.php' --exclude='index.php' --exclude='.htaccess' --exclude='_nuxt/' \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_SERVER_IP }}:${{ secrets.HOSTINGER_REMOTE_PATH }}

          # 2. Enviar especificamente a pasta _nuxt para dentro do tema
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/_nuxt/ ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_SERVER_IP }}:${{ secrets.HOSTINGER_REMOTE_PATH }}wp-content/themes/dija-theme/_nuxt/
